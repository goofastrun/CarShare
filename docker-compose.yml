version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: carsharing_db
    environment:
      POSTGRES_DB: carsharing
      POSTGRES_USER: carsharing_user
      POSTGRES_PASSWORD: carsharing_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carsharing_user -d carsharing"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: carsharing_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=carsharing
      - DB_USER=carsharing_user
      - DB_PASSWORD=carsharing_pass
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=django-insecure-carsharing-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: carsharing_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
